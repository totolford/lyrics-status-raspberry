name: "Mark stale issues and pull requests"

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-stale: 60
          days-before-close: 7

          days-before-pr-stale: -1
          days-before-pr-close: -1
          # Don't need this currently

          stale-issue-message: "This issue has been marked as stale due to inactivity. If no further activity occurs, it will be closed in 7 days."
          stale-pr-message: "This pull request has been marked as stale due to inactivity. If no further activity occurs, it will be closed in 7 days."

          close-issue-message: "Closing this issue due to prolonged inactivity. Feel free to reopen if needed."
          close-pr-message: "Closing this pull request due to prolonged inactivity. Reopen if you plan to continue working on it."

          stale-issue-label: "stale"
          stale-pr-label: "stale-pr"

          exempt-issue-labels: "important,help-wanted,in-progress"
          exempt-pr-labels: "in-progress,review-needed"

          remove-stale-when-updated: true
